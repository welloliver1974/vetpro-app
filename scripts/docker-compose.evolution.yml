# docker-compose.evolution.yml - Evolution API (WhatsApp)
# Use: docker compose -f docker-compose.evolution.yml up -d
# Requer: server na porta 80/8080 com proxy para esta porta
# Portas ocupadas em VPS ARM64: 80, 443, 4004 (app), 5000, 5432 (postgres supabase host)
# Porta livre escolhida: 8080
#
# ATENCAO: Evolution API v2.3.7 (latest) tem suporte ARM64 nativo.
# Imagens v1.8.x tem bug de QEMU em ARM64.

version: '3.8'
services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    platform: linux/arm64
    container_name: evolution-api
    restart: unless-stopped
    network_mode: host
    environment:
      - SERVER_TYPE=http
      - SERVER_URL=http://localhost:8080
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      # Postgres 16 instalado nativamente na VPS (Ubuntu cluster)
      - DATABASE_CONNECTION_URI=postgresql://evolution:postgres@127.0.0.1:5433/evolution
      - AUTHENTICATION_API_KEY=386c590c26ddcc3fcf0b398a67ab0564b480a2def492659aed28a211afb7e6bd
      - CONFIG_SESSION_PHONE_CLIENT=VetProApp
      - CORS_ORIGEN=*
      - LOG_LEVEL=INFO
    volumes:
      - evolution_data:/evolution/instances

volumes:
  evolution_data:
