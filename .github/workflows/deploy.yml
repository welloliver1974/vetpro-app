name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/vetpro-app
            cat > .env.local << 'EOF'
NEXT_PUBLIC_SUPABASE_URL=https://rhugpobguitqlrfiusmh.supabase.co
NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_I_049gIVqRFwwqka2khkVQ_0ZLPW42-
EOF
            git pull origin master
            npm ci --legacy-peer-deps
            npm run build
            PORT=4004 pm2 restart vetpro --update-env || PORT=4004 pm2 start npm --name vetpro -- start